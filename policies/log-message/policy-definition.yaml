name: log-message
version: v1.1.0
description: |
  Log request and response payloads and headers for observability without changing traffic.
  By default logs inline in real time during mediation via the gateway logs, including
  per-chunk streaming. Set enableTrafficLogging: true to instead opt the API into stdout
  traffic logging, where the traffic-logging publisher emits a single JSON line per request
  enriched with access-log-derived latencies (requires traffic logging to be enabled).

parameters:
  type: object
  additionalProperties: false
  properties:
    enableTrafficLogging:
      type: boolean
      x-wso2-policy-advanced-param: true
      default: false
      description: >-
        When true, opt this API into stdout traffic logging: the traffic-logging publisher
        emits a single enriched JSON line (with latencies) per request after the response
        completes; it requires [traffic_logging] to be enabled, and its request/response
        parameters filter/mask what the collector captured (they cannot enable capture the
        collector did not perform). When false (default), log inline in real time during
        mediation via the gateway logs, including per-chunk streaming.

    properties:
      type: object
      x-wso2-policy-advanced-param: false
      description: >-
        (enableTrafficLogging only) Extra key→value pairs attached to every emitted log
        line under "properties" — useful for filtering and querying logs by environment,
        tenant, or any request attribute. Example:
        `request_id: "$ctx:request.id"`, `env: production`.
        String values prefixed with "$ctx:" are evaluated as a CEL (Common Expression
        Language) expression against the request context at request time — anything
        from a bare reference (`$ctx:request.id`) to arithmetic, string ops, and
        conditionals (`$ctx:auth.authenticated ? auth.subject : "anonymous"`) or list/map
        macros (`$ctx:"admin" in auth.scopes`). The `ext.Strings()` CEL extension library
        (join, split, replace, trim, quote, …) is available. The result keeps its native
        CEL type (string/bool/number/list/map) in the emitted line; a compile or
        evaluation failure (undeclared variable, missing map/list key, or an auth.*
        reference when no auth policy ran) causes that property to be silently omitted.
        Available variables: request.path, request.method, request.authority,
        request.scheme, request.vhost, request.id, request.header (map, e.g.
        request.header['x-request-id'][0] — keys are always lower-case), request.metadata
        (map of dynamic keys set by other policies for inter-policy communication — the
        one variable here whose keys are not a fixed set, e.g.
        request.metadata['some_key_a_custom_policy_set']); api.id, api.name,
        api.version, api.context, api.kind, api.operation_path; project.id; and (bound only
        when an earlier auth policy ran) auth.subject, auth.type, auth.issuer,
        auth.credential_id, auth.token_id, auth.authenticated, auth.authorized,
        auth.audience (list), auth.scopes (sorted list), auth.property (map, case-sensitive
        keys, e.g. auth.property['tenant']).
        Non-resolvable references are skipped; non-string values are logged as-is.
      default: {}
      additionalProperties: {}

    maskedHeaders:
      type: array
      x-wso2-policy-advanced-param: true
      description: >-
        (enableTrafficLogging only) Header names (case-insensitive) whose values are
        redacted with "****" in the emitted log line. Merged with the global
        masked_headers list from config.toml — either source is sufficient to mask a header.
      items:
        type: string
        minLength: 1
        maxLength: 256
      uniqueItems: true
      default: []

    fields:
      type: object
      x-wso2-policy-advanced-param: true
      additionalProperties: false
      description: >-
        (enableTrafficLogging only) Control which fields appear in the emitted line.
        When set, this is authoritative over field presence — the request/response
        payload/headers toggles are ignored (global header masking still applies).
        Names are top-level keys (e.g. "latencies", "target", "requestHeaders", "properties")
        or dotted sub-key paths within map fields (e.g. "requestHeaders.authorization",
        "properties.env") to include/exclude individual headers. Set either "only" or "exclude",
        not both.
      not:
        required: [only, exclude]
      properties:
        only:
          type: array
          x-wso2-policy-advanced-param: true
          description: >-
            Keep exactly these fields and drop everything else. Use when you want
            a minimal log line with specific fields.
          items:
            type: string
            minLength: 1
            maxLength: 256
          uniqueItems: true
          default: []
        exclude:
          type: array
          x-wso2-policy-advanced-param: true
          description: >-
            Drop these fields and keep everything else. Use when you want the full
            log line minus a few noisy or sensitive fields.
          items:
            type: string
            minLength: 1
            maxLength: 256
          uniqueItems: true
          default: []
    request:
      type: object
      x-wso2-policy-advanced-param: false
      additionalProperties: false
      description: Log request data.
      properties:
        payload:
          type: boolean
          x-wso2-policy-advanced-param: false
          default: false
          description: Log request payload.
        headers:
          type: boolean
          x-wso2-policy-advanced-param: false
          default: false
          description: Log request headers.
        excludeHeaders:
          type: array
          x-wso2-policy-advanced-param: true
          description: >-
            Exclude request headers when request.headers is enabled (case-insensitive;
            matched headers are omitted entirely, not redacted). Works in both inline and
            enableTrafficLogging modes. To redact a header value instead of dropping it,
            use maskedHeaders.
          items:
            type: string
            minLength: 1
            maxLength: 256
          uniqueItems: true
          default: []
    response:
      type: object
      x-wso2-policy-advanced-param: false
      additionalProperties: false
      description: Log response data.
      properties:
        payload:
          type: boolean
          x-wso2-policy-advanced-param: false
          default: false
          description: Log response payload.
        headers:
          type: boolean
          x-wso2-policy-advanced-param: false
          default: false
          description: Log response headers.
        excludeHeaders:
          type: array
          x-wso2-policy-advanced-param: true
          description: >-
            Exclude response headers when response.headers is enabled (case-insensitive;
            matched headers are omitted entirely, not redacted). Works in both inline and
            enableTrafficLogging modes. To redact a header value instead of dropping it,
            use maskedHeaders.
          items:
            type: string
            minLength: 1
            maxLength: 256
          uniqueItems: true
          default: []
  anyOf:
    - required: [ request ]
    - required: [ response ]

systemParameters:
  type: object
  properties: {}
